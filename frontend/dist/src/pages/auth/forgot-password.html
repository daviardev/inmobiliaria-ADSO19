<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña – Altos del Roble</title>
  <script type="module" crossorigin src="/assets/forgotPassword-DbJ-PykQ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/login-Vmxavexy.css">
</head>
<body>
  <div class="standalone-container">
    <div class="s-icon">
      <ion-icon name="key-outline"></ion-icon>
    </div>
    <h2>Recuperar contraseña</h2>
    <p class="sub">Le enviaremos un enlace a su correo<br>para restablecer su contraseña</p>
    <form id="forgot-form">
      <div class="field">
        <ion-icon name="mail-outline"></ion-icon>
        <input name="correo" type="email" placeholder="Correo electrónico" required>
      </div>
      <button class="btn-main" type="submit">Enviar enlace</button>
      <p id="message" class="s-message"></p>
    </form>
    <p class="back-link">
      <ion-icon name="arrow-back-outline"></ion-icon>
      <a href="login.html">Volver a iniciar sesión</a>
    </p>
  </div>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>

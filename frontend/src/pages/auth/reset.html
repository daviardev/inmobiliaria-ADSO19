<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña – Altos del Roble</title>
  <link rel="stylesheet" href="../../styles/login.css">
</head>
<body>
  <div class="standalone-container">
    <div class="s-icon">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
    </div>
    <h2>Nueva contraseña</h2>
    <p class="sub">Elija una contraseña segura para<br>proteger su cuenta</p>
    <form id="reset-form">
      <div class="field">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <input type="password" id="password" placeholder="Nueva contraseña" required>
      </div>
      <div class="field">
        <ion-icon name="lock-open-outline"></ion-icon>
        <input type="password" id="confirm-password" placeholder="Confirmar contraseña" required>
      </div>
      <button class="btn-main" type="submit">Cambiar contraseña</button>
      <p id="message" class="s-message"></p>
    </form>
    <p class="back-link">
      <ion-icon name="arrow-back-outline"></ion-icon>
      <a href="login.html">Volver a iniciar sesión</a>
    </p>
  </div>
  <script src="../../js/reset.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
